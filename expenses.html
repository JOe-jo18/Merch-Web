<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Tracking - Merchandise Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Merchandise Hub</h1>
        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="collections.html">Collections</a></li>
                <li><a href="vendors.html">Vendors</a></li>
                <li><a href="inventory.html">Inventory</a></li>
                <li><a href="sales.html">Sales</a></li>
                <li><a href="expenses.html">Expenses</a></li>
                <li><a href="reports.html">Reports</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="expenses">
            <h2>Cost Tracking</h2>
            <button onclick="showAddExpenseModal()">Add New Expense</button>
            <div id="expenses-list">
                <!-- Expenses will be populated here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Merchandise Management System</p>
    </footer>

    <!-- Modal for adding expense -->
    <div id="addExpenseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addExpenseModal')">&times;</span>
            <h3>Add New Expense</h3>
            <form id="addExpenseForm">
                <label for="expenseDescription">Description:</label>
                <textarea id="expenseDescription" required></textarea>
                <label for="expenseAmount">Amount:</label>
                <input type="number" id="expenseAmount" step="0.01" required>
                <label for="expenseDate">Date:</label>
                <input type="date" id="expenseDate" required>
                <label for="expenseCategory">Category:</label>
                <input type="text" id="expenseCategory">
                <label for="expenseVendor">Vendor:</label>
                <select id="expenseVendor">
                    <option value="">Select Vendor</option>
                </select>
                <button type="submit">Add Expense</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
