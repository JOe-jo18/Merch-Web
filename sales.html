<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Tracking - Merchandise Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Merchandise Hub</h1>
        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="collections.html">Collections</a></li>
                <li><a href="vendors.html">Vendors</a></li>
                <li><a href="inventory.html">Inventory</a></li>
                <li><a href="sales.html">Sales</a></li>
                <li><a href="expenses.html">Expenses</a></li>
                <li><a href="reports.html">Reports</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="sales">
            <h2>Sales Tracking</h2>
            <button onclick="showAddSaleModal()">Record New Sale</button>
            <div id="sales-list">
                <!-- Sales will be populated here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Merchandise Management System</p>
    </footer>

    <!-- Modal for adding sale -->
    <div id="addSaleModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addSaleModal')">&times;</span>
            <h3>Record New Sale</h3>
            <form id="addSaleForm">
                <label for="saleProduct">Product:</label>
                <input type="text" id="saleProduct" required>
                <label for="saleQuantity">Quantity:</label>
                <input type="number" id="saleQuantity" required>
                <label for="salePrice">Price:</label>
                <input type="number" id="salePrice" step="0.01" required>
                <label for="saleDate">Date:</label>
                <input type="date" id="saleDate" required>
                <label for="saleVendor">Vendor:</label>
                <select id="saleVendor">
                    <option value="">Select Vendor</option>
                </select>
                <button type="submit">Record Sale</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
